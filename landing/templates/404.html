{% extends 'base.html' %}

{% block title %}404{% endblock %}

{% block content %}

<div class="flex flex-col justify-center min-h-[calc(100vh-12rem)] w-full py-10">
  <section class="w-full max-w-5xl mx-auto">
    <div class="grid gap-8 lg:grid-cols-[1.2fr_0.8fr] lg:items-end">

      <div class="space-y-4">
        <p class="text-xs font-semibold uppercase tracking-[0.4em] text-black/60 dark:text-white/60 sm:text-sm">
          Page not found
        </p>

        <h1
          class="select-none text-[clamp(5rem,24vw,15rem)] font-black leading-none tracking-[-0.1em] bg-clip-text text-black dark:text-white"
          style="
    background-image: repeating-linear-gradient(
      -58deg,
      currentColor 0 18px,
      transparent 18px 32px
    );
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  ">
          404
        </h1>

        <div class="max-w-xl space-y-2">
          <p class="text-base font-medium sm:text-lg dark:text-white">
            The page you requested does not exist.
          </p>
          <p class="text-sm leading-6 text-black/70 dark:text-white/70 sm:text-base">
            Check the URL, go back, or return to the homepage.
          </p>
        </div>
      </div>

      <div class="w-full flex justify-center self-center">
        <div class="inline-flex flex-col gap-3 border border-black dark:border-white p-4 sm:p-5">
          <a href="/"
            class="inline-flex min-h-11 items-center justify-center bg-black px-5 py-3 text-sm font-semibold uppercase tracking-[0.2em] text-white transition hover:bg-neutral-800 dark:bg-white dark:text-black dark:hover:bg-neutral-200">
            Home
          </a>

          <button type="button" onclick="history.back()"
            class="inline-flex min-h-11 items-center justify-center border border-black px-5 py-3 text-sm font-semibold uppercase tracking-[0.2em] text-black transition hover:bg-black hover:text-white dark:border-white dark:text-white dark:hover:bg-white dark:hover:text-black">
            Back
          </button>
        </div>
      </div>

    </div>
  </section>
</div>
{% endblock content %}
