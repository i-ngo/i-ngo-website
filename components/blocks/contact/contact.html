{% load component_tags static %}

<section class="py-12 md:py-24 lg:py-32 w-full">
  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
  
  <!-- Contact Form -->
  <div class="container mx-auto max-w-5xl px-4 sm:px-6 lg:px-8" x-data="contactForm">
    
    <div class="grid gap-10 lg:gap-8 lg:grid-cols-[0.95fr_1.05fr] lg:items-start">
      
      <!-- Flavor text -->
      <div class="space-y-4 sm:space-y-5">
        <h1 class="max-w-lg text-4xl font-black leading-tight tracking-[-0.05em] text-black dark:text-white sm:text-5xl">
          Let's talk.
        </h1>

        <div class="max-w-md space-y-2 sm:space-y-3">
          <p class="text-base font-medium text-black dark:text-white sm:text-lg">
            Questions, ideas, partnerships?
          </p>
          <p class="text-sm leading-6 text-black/70 dark:text-white/70 sm:text-base">
            Send me a message and I'll get back to you as soon as possible.
          </p>
        </div>
      </div>

      <!-- Form -->
      <div class="border border-black/15 bg-[#F8F4E9] p-5 sm:p-6 md:p-8 dark:border-white/15 dark:bg-[#242124]">
        
        <!-- Success Message -->
        <div
          x-show="status === 'success'"
          x-cloak
          class="mb-6 border border-green-700/30 bg-green-500/10 px-4 py-3 text-sm text-green-900 dark:text-green-300"
        >
          Your message has been sent successfully.
        </div>

        <!-- Error Message -->
        <div
          x-show="status === 'error'"
          x-cloak
          class="mb-6 border border-red-700/30 bg-red-500/10 px-4 py-3 text-sm text-red-900 dark:text-red-300"
        >
          <span x-text="errorMessage"></span>
        </div>

        <form @submit.prevent="submitForm" class="space-y-5 sm:space-y-6" x-show="status !== 'success'">
          <div class="space-y-2">
            <label
              for="name"
              class="block text-[11px] font-semibold uppercase tracking-[0.24em] text-black/65 dark:text-white/65"
            >
              Name
            </label>
            <input
              type="text"
              id="name"
              x-model="formData.name"
              required
              maxlength="50"
              class="block min-h-12 w-full border border-black/20 bg-white px-4 text-sm text-black outline-none transition placeholder:text-black/35 focus:border-[var(--color-blueiris)] dark:border-white/20 dark:bg-white/5 dark:text-white dark:placeholder:text-white/35"
            >
          </div>

          <div class="space-y-2">
            <label
              for="email"
              class="block text-[11px] font-semibold uppercase tracking-[0.24em] text-black/65 dark:text-white/65"
            >
              Email
            </label>
            <input
              type="email"
              id="email"
              x-model="formData.email"
              required
              maxlength="254"
              class="block min-h-12 w-full border border-black/20 bg-white px-4 text-sm text-black outline-none transition placeholder:text-black/35 focus:border-[var(--color-blueiris)] dark:border-white/20 dark:bg-white/5 dark:text-white dark:placeholder:text-white/35"
            >
          </div>

          <div class="space-y-2">
            <label
              for="message"
              class="block text-[11px] font-semibold uppercase tracking-[0.24em] text-black/65 dark:text-white/65"
            >
              Message
            </label>
            <textarea
              id="message"
              x-model="formData.message"
              rows="5"
              required
              maxlength="1785"
              class="block w-full resize-y border border-black/20 bg-white px-4 py-3 text-sm text-black outline-none transition placeholder:text-black/35 focus:border-[var(--color-blueiris)] dark:border-white/20 dark:bg-white/5 dark:text-white dark:placeholder:text-white/35"
            ></textarea>
          </div>

          <!-- hCaptcha -->
          <div class="pt-1 min-h-[78px] overflow-hidden sm:overflow-visible">
            <div class="h-captcha" data-sitekey="{{ HCAPTCHA_SITEKEY|default:'YOUR_SITE_KEY_HERE' }}"></div>
          </div>

          <div class="flex flex-col gap-3 sm:flex-row pt-2 relative z-10">
            <button
              type="submit"
              :disabled="isLoading"
              class="inline-flex min-h-12 w-full items-center justify-center gap-3 bg-black px-5 py-3 text-sm font-semibold uppercase tracking-[0.2em] text-white transition hover:bg-[var(--color-blueiris)] disabled:cursor-not-allowed disabled:opacity-70 dark:bg-white dark:text-black dark:hover:bg-[var(--color-blueiris)] dark:hover:text-white"
            >
              <svg
                x-show="isLoading"
                x-cloak
                class="h-4 w-4 animate-spin"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
              >
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              <span x-text="status === 'loading' ? 'Sending...' : 'Send message'">Send message</span>
            </button>
          </div>
        </form>
      </div>

    </div>
  </div>
</section>
