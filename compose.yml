x-common-settings: &common-settings
  build:
    context: .
    dockerfile: Dockerfile
    target: release
  depends_on:
    db:
      condition: service_healthy
  environment:
    - "ALLOWED_HOSTS=i-ngo.fun,www.i-ngo.fun,127.0.0.1,localhost"
    - "CSRF_TRUSTED_ORIGINS=https://i-ngo.fun,https://i-ngo.fun"
    - "DATABASE_URL=postgres://postgres@db/postgres"
    - "DJANGO_DEBUG=false"
    - "UV_PROJECT_ENVIRONMENT=/opt/venv"
  env_file: .env
  tty: true
  volumes:
    - .:/src:z,cache
    - django-tailwind-cli-data:/src/.django_tailwind_cli

services:
  db:
    environment:
      - "POSTGRES_HOST_AUTH_METHOD=trust"
      - "PGDATA=/var/lib/postgresql/data/pgdata"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres -q"]
      interval: 30s
      start_interval: 1s
      start_period: 20s
      timeout: 3s
      retries: 5
    image: "pgautoupgrade/pgautoupgrade:18.3-alpine"
    init: true
    volumes:
      - .:/src:cache
      - postgres-data:/var/lib/postgresql/data/

  worker:
    <<: *common-settings
    command: ["/src/start-worker.sh"]
    healthcheck:
      test: ["CMD-SHELL", "/src/healthcheck-worker.sh"]
      interval: 30s
      start_interval: 3s
      start_period: 60s
      timeout: 10s
      retries: 3
    init: true

  tailwind:
    <<: *common-settings
    command: ["/src/start-tailwind.sh"]
    init: true

  utility:
    <<: *common-settings
    command: ["uv", "run", "--no-sync", "-m", "manage", "--version"]
    entrypoint: ["/src/compose-entrypoint.sh"]

  web:
    <<: *common-settings
    command: ["/src/start-dev.sh"]
    healthcheck:
      test: ["CMD-SHELL", "/src/healthcheck-web.sh"]
      interval: 30s
      start_interval: 2s
      start_period: 60s
      timeout: 5s
      retries: 3
    init: true
    expose:
      - "8000"

  nginx:
    image: nginx:stable-alpine
    depends_on:
      web:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/certbot/www:/var/www/certbot
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./media:/media:ro
    restart: unless-stopped
    init: true

  certbot:
    image: certbot/certbot:latest
    profiles: ["ops"]
    volumes:
      - ./deploy/certbot/www:/var/www/certbot
      - ./deploy/certbot/conf:/etc/letsencrypt

volumes:
  django-tailwind-cli-data:
  postgres-data:
